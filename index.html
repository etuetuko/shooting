<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>中2英語：English Sniper</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            width: 600px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            text-align: center;
        }
        .screen { display: none; }
        .active { display: block; }
        
        h1 { color: #4ecca3; font-size: 2em; margin-bottom: 10px; }
        .info { color: #95a5a6; margin-bottom: 20px; }
        
        #question-text { font-size: 2.5em; margin: 40px 0; font-weight: bold; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        button {
            padding: 15px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            transition: 0.2s;
        }
        button:hover { background: #e94560; transform: scale(1.02); }
        .unit-btn { width: 100%; margin-bottom: 10px; background: #4ecca3; color: #1a1a2e; font-weight: bold; }
        
        #feedback { height: 30px; font-weight: bold; margin-top: 10px; }
        .correct { color: #4ecca3; }
        .incorrect { color: #e94560; }
        
        #progress-bar {
            width: 100%;
            height: 10px;
            background: #0f3460;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #4ecca3;
            border-radius: 5px;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>ENGLISH SNIPER</h1>
        <p class="info">中学2年生：英単語ミッション</p>
        <button class="unit-btn" onclick="startGame(1)">Unit 1-3 & LR1 (旅行・歴史)</button>
        <button class="unit-btn" onclick="startGame(2)">Unit 4-6 & LR2 (ルール・比較)</button>
        <button class="unit-btn" onclick="startGame(3)">Unit 7 & LR3 (環境・世界遺産)</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="score-display">SCORE: 0</div>
        <div id="question-text">日本語</div>
        <div class="grid" id="choices-grid">
            <button onclick="checkAnswer(0)">Choice 1</button>
            <button onclick="checkAnswer(1)">Choice 2</button>
            <button onclick="checkAnswer(2)">Choice 3</button>
            <button onclick="checkAnswer(3)">Choice 4</button>
        </div>
        <div id="feedback"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1>MISSION COMPLETE</h1>
        <p id="final-score" style="font-size: 1.5em;"></p>
        <p id="final-rank" style="color: #4ecca3; font-weight: bold;"></p>
        <button onclick="location.reload()">もう一度プレイ</button>
    </div>
</div>

<script>
const wordData = {
    1: [
        {j: "休日、休暇", e: "holiday"}, {j: "到着する", e: "arrive"}, {j: "空港", e: "airport"}, {j: "すぐに", e: "soon"},
        {j: "わくわくした", e: "excited"}, {j: "予約", e: "reservation"}, {j: "メートル", e: "meter"}, {j: "重さがある", e: "weigh"},
        {j: "見つける", e: "find"}, {j: "findの過去形", e: "found"}, {j: "言語", e: "language"}, {j: "例", e: "example"},
        {j: "意思疎通する", e: "communicate"}, {j: "機械の", e: "mechanical"}, {j: "おもり", e: "weight"}, {j: "動力供給する", e: "power"},
        {j: "かね(の音)", e: "bell"}, {j: "改善する", e: "improve"}, {j: "最後には", e: "eventually"}, {j: "努力", e: "effort"}
    ],
    2: [

        {j: "規則、ルール", e: "rule"}, {j: "完璧な", e: "perfect"}, {j: "～しなければならない", e: "must"}, {j: "～すべきである", e: "should"},
        {j: "傷つける", e: "hurt"}, {j: "感情", e: "feeling"}, {j: "説明する", e: "explain"}, {j: "経験", e: "experience"},
        {j: "よりきれいな", e: "cleaner"}, {j: "最も", e: "most"}, {j: "～より", e: "than"}, {j: "病気の", e: "ill"},
        {j: "手術", e: "operation"}, {j: "生きている", e: "alive"}, {j: "請求書", e: "bill"}, {j: "恐れて", e: "afraid"}
    ],
    3: [
        {j: "選ぶ", e: "select"}, {j: "遺産", e: "heritage"}, {j: "遺跡", e: "site"}, {j: "自然の", e: "natural"},
        {j: "文化の", e: "cultural"}, {j: "基準", e: "standard"}, {j: "決める", e: "decide"}, {j: "knowの過去分詞", e: "known"},
        {j: "多様性", e: "diversity"}, {j: "buildの過去分詞", e: "built"}, {j: "汚染", e: "pollution"}, {j: "政府", e: "government"},
        {j: "キャンプする", e: "camp"}, {j: "野生の", e: "wild"}, {j: "自由", e: "freedom"}, {j: "突然", e: "suddenly"},
        {j: "姿を消す", e: "disappear"}, {j: "地球温暖化", e: "global warming"}, {j: "十分な", e: "enough"}, {j: "地球", e: "Earth"}
    ]
};

let currentQuiz = [];
let currentIndex = 0;
let score = 0;
let choices = [];

function startGame(unitId) {
    currentQuiz = [...wordData[unitId]].sort(() => Math.random() - 0.5);
    currentIndex = 0;
    score = 0;
    showScreen('game-screen');
    nextQuestion();
}

function nextQuestion() {
    if (currentIndex >= currentQuiz.length) {
        showResult();
        return;
    }
    
    const target = currentQuiz[currentIndex];
    document.getElementById('question-text').innerText = target.j;
    document.getElementById('score-display').innerText = `SCORE: ${score}`;
    document.getElementById('feedback').innerText = "";
    document.getElementById('progress-fill').style.width = `${(currentIndex / 20) * 100}%`;

    // 選択肢作成
    choices = [target.e];
    const allWords = currentQuiz.map(w => w.e);
    while (choices.length < 4) {
        let dummy = allWords[Math.floor(Math.random() * allWords.length)];
        if (!choices.includes(dummy)) choices.push(dummy);
    }
    choices.sort(() => Math.random() - 0.5);

    const buttons = document.querySelectorAll('#choices-grid button');
    buttons.forEach((btn, i) => {
        btn.innerText = choices[i];
        btn.disabled = false;
        btn.style.background = "#0f3460";
    });
}

function checkAnswer(index) {

    buttons.forEach(btn => btn.disabled = true);

    const selected = choices[index];
